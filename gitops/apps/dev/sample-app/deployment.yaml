apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: sample-app
  labels:
    app: sample-app
    environment: dev
    managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
        environment: dev
    spec:
      containers:
        - name: sample-app
          # ECR pull-through cache path — docker-hub prefix
          # Nodes pull via the private ECR endpoint, no internet needed
          # Full path resolves to docker-hub/library/nginx on first pull
          # then is cached in ECR indefinitely
          image: 435321828725.dkr.ecr.ap-southeast-2.amazonaws.com/docker-hub/library/nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3